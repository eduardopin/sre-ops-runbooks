name: quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdown-and-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Public safety audit
        run: |
          if grep -RIn "SEU_EMAIL_DE_COMMIT_NO_GITHUB" . --exclude-dir=.git; then exit 1; fi
          echo "Basic public safety audit OK"
