name: validate

on:
  pull_request:
  push:
    branches: [ main, master, develop, dev ]

jobs:
  repository-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required repository files
        run: |
          test -f README.md
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f CHANGELOG.md
      - name: Check whitespace
        run: git diff --check
      - name: Check generated documentation paths
        run: |
          test -d docs || test -d _eduardo-notes
      - name: Summarize validation scope
        run: echo "Validated authored repository documentation and hygiene."
