name: docs-hygiene

on:
  pull_request:
  push:
    branches: [ main, master, develop, dev ]

jobs:
  markdown-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check markdown files exist
        run: |
          count=$(find . -path ./.git -prune -o -name '*.md' -print | wc -l)
          test "$count" -gt 0
      - name: Check for sensitive local files
        run: |
          if git ls-files | grep -E '(^|/)\.env$|\.tfstate(\..*)?$'; then
            echo "Sensitive local file pattern is tracked"
            exit 1
          fi
